name: ANSIBLE
on:
  pull_request:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        default: 'UpgradeAddons'
        options:
          - UpgradeAddons
          - ScaleNodes
          - Upgrade
          - Install
          - Reset

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ansible: ${{ steps.filter.outputs.ansible }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ansible:
              - '.github/workflows/ansible.yml'
              - 'inventory/**'
              - 'kubespray/**'
              - '*.yml'

  ansible-required:
    name: ansible-required
    needs: [changes, ansible]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Pass when not needed or when ansible passed
        run: |
          if [ "${{ needs.changes.outputs.ansible }}" = "true" ]; then
            [ "${{ needs.ansible.result }}" = "success" ]
          else
            echo "No relevant changes; required check passes."
          fi

  ansible:
    runs-on: ubuntu-latest

    needs: changes
    if: needs.changes.outputs.ansible == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
    
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.ID_RSA }}
          name: id_rsa
          known_hosts: unnecessary
          if_key_exists: fail

      - name: Install Packages
        run: pip install -r requirements.txt
      
      - name: Setup Ansible Roles
        run: |
          rm kubespray/playbooks/roles || true
          ln -s ../roles kubespray/playbooks/roles

      - name: Run PreAnsible Jobs
        if: github.ref == 'refs/heads/main'
        run: ansible-playbook -i inventory/sample/inventory.ini additional.yml -b -v

      - name: Run Ansible Kubespray
        env:
          CMD: ${{ github.event.inputs.action }}
          EVENT: ${{ github.event_name }}
        run: |
          CMD=${CMD:-"UpgradeAddons"}
          echo $EVENT

          if [ "$EVENT" != "pull_request" ]; then
            ARGS="--check --diff"
          fi

          if [ "$CMD" == "Install" ]; then
            ARGS="kubespray/cluster.yml -l kube_control_plane"
          elif [ "$CMD" == "UpgradeAddons" ]; then
            ARGS="kubespray/upgrade-cluster.yml --tags=apps"
          elif [ "$CMD" == "ScaleNodes" ]; then
            ARGS="kubespray/scale.yml"
          elif [ "$CMD" == "Upgrade" ]; then
            ARGS="kubespray/upgrade-cluster.yml"
          elif [ "$CMD" == "Reset" ]; then
            ARGS="kubespray/reset.yml -e reset_confirmation=yes"
          fi

          ansible-playbook -i inventory/sample/inventory.ini $ARGS -b -v

      - name: Run Post Install
        if: github.event_name != 'pull_request'
        run: ansible-playbook -i inventory/sample/inventory.ini post_install.yml -b -v

      - name: Get admin.conf
        if: (github.event.inputs.action == 'Install' || github.event.inputs.action == 'UpgradeAddons') && github.event_name != 'pull_request'
        env:
          KUBE_CONFIG: ${{ github.workspace }}/admin.conf
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@192.168.1.10 "sudo cat /etc/kubernetes/super-admin.conf" > $KUBE_CONFIG
          sed -i 's/127.0.0.1/192.168.1.10/g' $KUBE_CONFIG

      - name: Install Root Chart
        if: (github.event.inputs.action == 'Install' || github.event.inputs.action == 'UpgradeAddons') && github.event_name != 'pull_request'
        env:
          KUBECONFIG: ${{ github.workspace }}/admin.conf
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl

          ./kubectl get ns argocd || ./kubectl create namespace argocd
          ./kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          ./kubectl apply -f application.yaml
