---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: docker-pull-auth
spec:
  secretStoreRef:
    name: external-infra
    kind: ClusterSecretStore
  target:
    name: docker-pull-auth
    template:
      type: Opaque
  data:
    - remoteRef:
        key: DOCKER_PUBLIC
        property: username
      secretKey: USERNAME
    - remoteRef:
        key: DOCKER_PUBLIC
        property: password
      secretKey: PASSWORD
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docker-pull
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: {{ .Values.storage.nobackup }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-pull
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-pull
  template:
    metadata:
      labels:
        app: docker-pull
    spec:
      imagePullSecrets:
        - name: cluster-docker-secrets
      containers:
        - name: app
          image: docker.io/{{ .Values.registry.image.repository }}:{{ .Values.registry.image.tag }}
          env:
            - name: REGISTRY_HTTP_SECRET
              valueFrom:
                secretKeyRef:
                  name: registry-htpasswd
                  key: htpasswd
            - name: REGISTRY_AUTH
              value: htpasswd
            - name: REGISTRY_AUTH_HTPASSWD_REALM
              value: Registry Realm
            - name: REGISTRY_AUTH_HTPASSWD_PATH
              value: /auth/htpasswd
            - name: REGISTRY_PROXY_REMOTEURL
              value: https://registry-1.docker.io
            - name: REGISTRY_PROXY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: docker-pull-auth
                  key: USERNAME
            - name: REGISTRY_PROXY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docker-pull-auth
                  key: PASSWORD
            - name: REGISTRY_PROXY_TTL
              value: 168h
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          resources:
            {{- with.Values.registry.resources }}
            requests:
              {{- toYaml . | nindent 14 }}
            limits:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          ports:
            - containerPort: 5000
              name: port-5000
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - mountPath: /var/lib/registry
              name: config
            - mountPath: /auth
              name: htpasswd
      securityContext:
        runAsGroup: 1000
        runAsUser: 1000
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: docker-pull
        - name: htpasswd
          secret:
            defaultMode: 420
            secretName: registry-htpasswd
---
apiVersion: v1
kind: Service
metadata:
  name: docker-pull
spec:
  ports:
    - name: port-5000
      port: 5000
      protocol: TCP
      targetPort: 5000
  selector:
    app: docker-pull
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/target: mordorhome.{{ .Values.domains.external }}
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 5000m
    nginx.ingress.kubernetes.io/proxy-body-size: 5000m
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  name: docker-pull
spec:
  ingressClassName: nginx
  rules:
    - host: dockerhub.{{ .Values.domains.external }}
      http:
        paths:
          - backend:
              service:
                name: docker-pull
                port:
                  number: 5000
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - '*.{{ .Values.domains.external }}'
      secretName: wildcard-external
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: docker-pull-web-rps
spec:
  scaleTargetRef:
    name: docker-pull
    kind: Deployment
  pollingInterval: 10
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: registr_web_rps_per_pod
        threshold: "2"
        query: |
          sum(rate(nginx_ingress_controller_requests{exported_namespace="{{ .Release.Namespace }}",ingress="docker-pull"}[1m]))
          /
          count(kube_pod_info{namespace="{{ .Release.Namespace }}",pod=~"docker-pull-.*"})
