apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole
  namespace: kube-networking
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: thorin-default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: kube-networking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: pihole
          image: pihole/pihole:latest
          env:
            - name: TZ
              value: "America/Toronto"
            - name: FTLCONF_webserver_api_password
              value: "changeme"
            - name: FTLCONF_misc_dnsmasq_lines
              value: address=/.k8s.private/192.168.1.10;address=/.yusufali.ca/192.168.1.10;address=/yusufali.ca/192.168.1.10
            - name: FTLCONF_dns_upstreams
              value: 1.1.1.1;8.8.8.8
            - name: FTLCONF_webserver_port
              value: "3080o"
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
            - containerPort: 3080
          volumeMounts:
            - name: pihole-config
              mountPath: /etc/pihole
      volumes:
        - name: pihole-config
          persistentVolumeClaim:
            claimName: pihole
---
