apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: thorin-default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  labels:
    app: vault
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      volumes:
        - name: vaultdata
          persistentVolumeClaim:
            claimName: vault
      containers:
        - name: app
          image: {{ .Values.vault.image.repository }}:{{ .Values.vault.image.tag }}
          imagePullPolicy: {{ .Values.vault.image.pullPolicy }}
          command:
            - vault
          args:
            - server
            - -config=/vault/config/config.hcl
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_ADDR
              value: http://127.0.0.1:8200
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - |
                  vault status >/dev/null 2>&1
                  rc=$?
                  [ "$rc" -eq 0 ] || [ "$rc" -eq 2 ]
            failureThreshold: {{ .Values.vault.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.vault.probes.startup.periodSeconds }}
          livenessProbe:
            initialDelaySeconds: {{ .Values.vault.probes.liveness.initialDelaySeconds }}
            timeoutSeconds: {{ .Values.vault.probes.liveness.timeoutSeconds }}
            periodSeconds: {{ .Values.vault.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.vault.probes.liveness.failureThreshold }}
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
          readinessProbe:
            timeoutSeconds: {{ .Values.vault.probes.readiness.timeoutSeconds }}
            periodSeconds: {{ .Values.vault.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.vault.probes.readiness.failureThreshold }}
            exec:
              command:
                - vault
                - status
                - -tls-skip-verify
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - |
                    i=0
                    until vault status >/dev/null 2>&1; do
                      rc=$?
                      if [ "$rc" -eq 0 ] || [ "$rc" -eq 2 ]; then
                        break
                      fi
                      i=$((i + 1))
                      if [ "$i" -ge 30 ]; then
                        echo "Vault API did not become reachable in time"
                        exit 1
                      fi
                      sleep 2
                    done
                    exec /vault/unseal.sh
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: vaultdata
              mountPath: /vault
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  labels:
    app: vault
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  selector:
    app: vault
  ports:
    - protocol: TCP
      port: 8200
      targetPort: 8200
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault
spec:
  ingressClassName: nginx
  rules:
    - host: vault.{{ .Values.domains.internal }}
      http:
        paths:
          - backend:
              service:
                name: vault
                port:
                  number: 8200
            path: /
            pathType: Prefix
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-external
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/target: mordorhome.{{ .Values.domains.external }}
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: vault.{{ .Values.domains.external }}
      http:
        paths:
          - backend:
              service:
                name: vault
                port:
                  number: 8200
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - '*.{{ .Values.domains.external }}'
      secretName: wildcard-external
