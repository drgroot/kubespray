apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-defrag
  namespace: kube-system
spec:
  schedule: "0 3 */10 * *"
  jobTemplate:
    spec:
      template:
        spec:
          hostNetwork: true
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule
          restartPolicy: OnFailure
          containers:
            - name: etcd-defrag
              image: quay.io/coreos/etcd:v3.5.26
              env:
                - name: NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
                - name: ETCDCTL_API
                  value: "3"
              command:
                - etcdctl
              args:
                - --endpoints=https://127.0.0.1:2379
                - --cacert=/etc/ssl/etcd/ssl/ca.pem
                - --cert=/etc/ssl/etcd/ssl/member-$(NODE_NAME).pem
                - --key=/etc/ssl/etcd/ssl/member-$(NODE_NAME)-key.pem
                - defrag
              volumeMounts:
                - name: etcd-certs
                  mountPath: /etc/ssl/etcd/ssl
                  readOnly: true
          volumes:
            - name: etcd-certs
              hostPath:
                path: /etc/ssl/etcd/ssl
